<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obsah</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #1a1a1a;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    #stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100vh;
      height: 100dvh;
      padding: 16px;
      background: #ffffff;
      overflow: hidden;
    }

    .ui-overlay {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 14px;
      width: 100%;
      max-width: 980px;
    }

    .toolbar-btn,
    #verify-btn {
      padding: 10px 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #1a1a1a;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    .toolbar-btn:hover,
    #verify-btn:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .area-quiz {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    .area-quiz-label {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
    }

    #area-value {
      width: 88px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      text-align: center;
    }

    #area-value:focus {
      outline: none;
      border-color: #3b50f0;
    }

    #area-value.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #area-value.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #area-unit {
      min-width: 92px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }

    #area-unit:focus {
      outline: none;
      border-color: #3b50f0;
    }

    #area-unit.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #area-unit.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #verify-btn.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #verify-btn.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #diagram-wrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #diagram {
      display: block;
      touch-action: none;
      user-select: none;
    }

    .stack-tile {
      cursor: grab;
    }

    .stack-tile:active {
      cursor: grabbing;
    }

    .placed-tile {
      cursor: grab;
    }

    .placed-tile.is-dragging {
      cursor: grabbing;
    }

    .stack-hit,
    .tile-hit {
      fill: transparent;
      stroke: none;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <main id="stage">
    <div class="ui-overlay">
      <button id="new-canvas-btn" class="toolbar-btn" type="button">Nový náhodný obdélník</button>
      <div class="area-quiz">
        <span class="area-quiz-label">Obsah obdélníku je</span>
        <input id="area-value" type="number" min="0" step="any" inputmode="decimal" aria-label="Hodnota obsahu" />
        <select id="area-unit" aria-label="Jednotka obsahu">
          <option value="dm2">dm²</option>
          <option value="cm2">cm²</option>
          <option value="mm2">mm²</option>
        </select>
        <button id="verify-btn" type="button">Ověřit</button>
      </div>
    </div>
    <div id="diagram-wrap">
    <svg id="diagram" width="844" height="563" viewBox="0 0 843.96 563.16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Obsah">
      <rect id="diagram-bg" width="843.96" height="563.16" fill="#ffffff"/>
      <g id="content" transform="scale(1.56)">
        <g id="static-layer">
          <rect id="canvas" fill="#CACACA" stroke="black"/>
          <g id="canvas-ticks"></g>
          <g id="canvas-labels"></g>
        </g>

        <g id="tile-stack" aria-label="Zásobník dlaždic">
          <g class="stack-tile" data-type="dm2" transform="translate(83.5, 0.5)">
            <rect class="stack-visual" width="99" height="99" fill="#9FFFAD" stroke="#0F880D"/>
            <rect class="stack-hit" x="0" y="0" width="99" height="99"/>
            <text x="49.5" y="54" text-anchor="middle" fill="#0F880D" font-size="10" font-family="system-ui, sans-serif">1 dm²</text>
          </g>
          <g class="stack-tile" data-type="cm2" transform="translate(257.5, 90.5)">
            <rect class="stack-visual" width="9.9" height="9.9" fill="#9FA5FF" stroke="#110D88"/>
            <rect class="stack-hit" x="-8" y="-8" width="25" height="25"/>
            <text x="4.95" y="-4" text-anchor="middle" fill="#110D88" font-size="10" font-family="system-ui, sans-serif">1 cm²</text>
          </g>
          <g class="stack-tile" data-type="mm2" transform="translate(329.25, 99.25)">
            <rect class="stack-visual" width="0.99" height="0.99" fill="#FF9F9F" stroke="#880D0D" stroke-width="0.5"/>
            <rect class="stack-hit" x="-12" y="-12" width="24" height="24"/>
            <text x="0.495" y="-4" text-anchor="middle" fill="#880D0D" font-size="10" font-family="system-ui, sans-serif">1 mm²</text>
          </g>
        </g>

        <g id="placed-tiles"></g>
      </g>
    </svg>
    </div>
  </main>
  <script src="main.js"></script>
</body>
</html>
