<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obsah</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #1a1a1a;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    #stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      height: 100vh;
      height: 100dvh;
      padding: 16px;
      background: #ffffff;
      overflow: hidden;
    }

    .ui-overlay {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 14px;
      width: 100%;
      max-width: 980px;
    }

    .toolbar-btn,
    #verify-btn {
      padding: 10px 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #1a1a1a;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    .toolbar-btn:hover,
    #verify-btn:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .toolbar-btn.is-active {
      border-color: #3b50f0;
      background: #f4f6ff;
      color: #1e2a8a;
    }

    .area-quiz {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    .area-quiz-label {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
    }

    #area-value {
      width: 88px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      text-align: center;
    }

    #area-value:focus {
      outline: none;
      border-color: #3b50f0;
    }

    #area-value.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #area-value.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #area-unit {
      min-width: 92px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }

    #area-unit:focus {
      outline: none;
      border-color: #3b50f0;
    }

    #area-unit.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #area-unit.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #verify-btn.is-correct {
      border-color: #16a34a;
      background: #ecfdf5;
      color: #166534;
    }

    #verify-btn.is-wrong {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    #tile-stack {
      position: relative;
      flex-shrink: 0;
      width: calc(258px * 1.56);
      height: calc(110px * 1.56);
      margin: 0 auto;
    }

    #tile-stack .stack-tile {
      position: absolute;
      touch-action: none;
      user-select: none;
    }

    #tile-stack .stack-tile[data-type="dm2"] {
      left: 0;
      top: calc(0.5px * 1.56);
      width: calc(99px * 1.56);
      height: calc(99px * 1.56);
    }

    #tile-stack .stack-tile[data-type="cm2"] {
      left: calc(174px * 1.56);
      top: calc(90.5px * 1.56);
      width: calc(9.9px * 1.56);
      height: calc(9.9px * 1.56);
    }

    #tile-stack .stack-tile[data-type="mm2"] {
      left: calc(245.75px * 1.56);
      top: calc(99.25px * 1.56);
      width: calc(24px * 1.56);
      height: calc(24px * 1.56);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stack-visual-dm2,
    .stack-visual-cm2,
    .stack-visual-mm2 {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
    }

    .stack-visual-dm2 {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #9fffad;
      border: 1px solid #0f880d;
      color: #0f880d;
      font-size: calc(10px * 1.56);
      font-weight: 500;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .stack-visual-cm2 {
      background: #9fa5ff;
      border: 1px solid #110d88;
    }

    .stack-visual-mm2 {
      width: calc(0.99px * 1.56);
      height: calc(0.99px * 1.56);
      background: #ff9f9f;
      border: 0.5px solid #880d0d;
    }

    .stack-label {
      position: absolute;
      left: 50%;
      bottom: 100%;
      transform: translateX(-50%);
      margin-bottom: 2px;
      font-size: calc(10px * 1.56);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      white-space: nowrap;
      pointer-events: none;
    }

    .stack-label-dm2 {
      color: #0f880d;
    }

    .stack-label-cm2 {
      color: #110d88;
    }

    .stack-label-mm2 {
      color: #880d0d;
    }

    #diagram-wrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #diagram {
      display: block;
      touch-action: none;
      user-select: none;
    }

    .stack-tile {
      cursor: grab;
    }

    .stack-tile:active {
      cursor: grabbing;
    }

    .placed-tile {
      cursor: grab;
    }

    .placed-tile.is-dragging {
      cursor: grabbing;
    }

    .stack-hit,
    .tile-hit {
      fill: transparent;
      stroke: none;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <main id="stage">
    <div class="ui-overlay">
      <button id="new-canvas-btn" class="toolbar-btn" type="button">Nový obdélník</button>
      <button id="free-surface-btn" class="toolbar-btn" type="button">Volná plocha</button>
      <div class="area-quiz">
        <span class="area-quiz-label">Obsah obdélníku je</span>
        <input id="area-value" type="number" min="0" step="any" inputmode="decimal" aria-label="Hodnota obsahu" />
        <select id="area-unit" aria-label="Jednotka obsahu">
          <option value="dm2">dm²</option>
          <option value="cm2">cm²</option>
          <option value="mm2">mm²</option>
        </select>
        <button id="verify-btn" type="button">Ověřit</button>
      </div>
    </div>
    <div id="tile-stack" aria-label="Zásobník dlaždic">
      <div class="stack-tile" data-type="dm2">
        <div class="stack-visual-dm2">1 dm²</div>
      </div>
      <div class="stack-tile" data-type="cm2">
        <span class="stack-label stack-label-cm2">1 cm²</span>
        <div class="stack-visual-cm2"></div>
      </div>
      <div class="stack-tile" data-type="mm2">
        <span class="stack-label stack-label-mm2">1 mm²</span>
        <div class="stack-visual-mm2"></div>
      </div>
    </div>
    <div id="diagram-wrap">
    <svg id="diagram" width="844" height="563" viewBox="0 0 843.96 563.16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Obsah">
      <rect id="diagram-bg" width="843.96" height="563.16" fill="#ffffff"/>
      <g id="content" transform="scale(1.56)">
        <g id="static-layer">
          <g id="canvas-group">
            <rect id="canvas" x="0" y="0" fill="#CACACA" stroke="black"/>
            <g id="canvas-ticks"></g>
            <g id="canvas-labels"></g>
          </g>
        </g>
        <g id="placed-tiles"></g>
      </g>
    </svg>
    </div>
  </main>
  <script src="main.js"></script>
</body>
</html>
